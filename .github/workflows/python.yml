name: Python

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ggsql-python
          shared-key: ${{ matrix.os }}-python

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ggsql-python
          command: build
          args: --release
          sccache: true

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/ggsql-*.whl

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          WHEEL=$(ls dist/ggsql-*.whl)
          pip install "${WHEEL}[test]"

      - name: Run tests
        shell: bash
        run: pytest ggsql-python/tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli

      - name: Check Rust formatting
        run: cargo fmt --package ggsql-python -- --check

      - name: Clippy
        run: cargo clippy --package ggsql-python -- -D warnings
