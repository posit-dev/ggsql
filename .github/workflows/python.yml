name: Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: ubuntu-latest
            delay: 140
          - os: macos-latest
            delay: 210
          - os: windows-latest
            delay: 70
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stagger start by OS
        run: sleep ${{ matrix.delay }}s
        shell: bash

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v4-rust
          shared-key: ${{ matrix.os }}-python
          cache-on-failure: true

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Check Rust formatting
        run: cargo fmt --package ggsql-python -- --check

      - name: Clippy
        run: cargo clippy --package ggsql-python -- -D warnings

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ggsql-python
          command: build
          args: --release
          sccache: true
        env:
          # On Windows/MSVC, the cc crate's cl.exe detection bypasses its
          # RUSTC_WRAPPER-based sccache fallback. Setting CC/CXX tells the
          # cc crate to parse "sccache" as a known wrapper and "cl" as the
          # compiler, routing DuckDB C++ builds through sccache.
          # ilammy/msvc-dev-cmd puts cl.exe on PATH so sccache can find it.
          CC: ${{ runner.os == 'Windows' && 'sccache cl' || '' }}
          CXX: ${{ runner.os == 'Windows' && 'sccache cl' || '' }}

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          WHEEL=$(ls target/wheels/ggsql-*.whl)
          pip install "${WHEEL}[test]"

      - name: Run tests
        shell: bash
        run: pytest ggsql-python/tests/ -v
